name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  server-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run test:server

  web-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run test:web

  e2e-test:
    runs-on: ubuntu-latest
    needs:
      - server-test
      - web-test

    steps:
      - uses: actions/checkout@v4

      - name: Prepare compose env
        run: cp .env.example .env

      - name: Start split stack
        run: docker compose --project-name bbnote-ci -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Wait for split stack
        shell: bash
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://localhost:8080/healthz > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose --project-name bbnote-ci -f docker-compose.yml -f docker-compose.ci.yml logs
          exit 1

      - name: Build Playwright runner
        run: docker build --file e2e/Dockerfile --tag bbnote-e2e .

      - name: Run Playwright against split stack
        run: docker run --rm --network bbnote-ci_default -e PLAYWRIGHT_BASE_URL=http://web bbnote-e2e

      - name: Stop split stack
        if: always()
        run: docker compose --project-name bbnote-ci -f docker-compose.yml -f docker-compose.ci.yml down -v

  docker:
    runs-on: ubuntu-latest
    needs:
      - server-test
      - web-test
      - e2e-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bbnote-web
            dockerfile: web/Dockerfile
          - image: bbnote-server
            dockerfile: server/Dockerfile
          - image: bbnote
            dockerfile: Dockerfile.all-in-one

    steps:
      - uses: actions/checkout@v4

      - id: vars
        shell: bash
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
