services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    user: "0:0"
    env_file:
      - .env
    environment:
      APP_BASE_URL: http://web
      OIDC_ISSUER_URL: https://issuer.example.com
      BBNOTE_TEST_AUTH_ENABLED: "true"
    volumes:
      - bbnote-ci-db:/data/db
      - bbnote-ci-notes:/data/notes
      - bbnote-ci-attachments:/data/attachments
      - bbnote-ci-exports:/data/exports

  e2e:
    build:
      context: .
      dockerfile: e2e/Dockerfile
    depends_on:
      - web
      - server
    environment:
      PLAYWRIGHT_BASE_URL: http://web

volumes:
  bbnote-ci-db:
  bbnote-ci-notes:
  bbnote-ci-attachments:
  bbnote-ci-exports:
