services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      APP_PORT: 3000
      APP_BASE_URL: http://localhost:3000
      OIDC_ISSUER_URL: http://localhost:3000/mock-oidc
      OIDC_CLIENT_ID_WEB: bbnote-web
      OIDC_CLIENT_ID_ANDROID: bbnote-android
      OIDC_SCOPES: openid profile email
      SQLITE_PATH: /data/db/bbnote.sqlite
      NOTES_ROOT: /data/notes
      ATTACHMENTS_ROOT: /data/attachments
      MOCK_OIDC_ENABLED: "true"
    volumes:
      - ./data/db:/data/db
      - ./data/notes:/data/notes
      - ./data/attachments:/data/attachments

